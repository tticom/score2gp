name: Raster Diagnostics Gate Advisory

on:
  push:
  pull_request:

jobs:
  gate-check:
    name: Raster Diagnostics Gate (Advisory)
    runs-on: ubuntu-latest

    # This job provides an advisory product-health signal.
    # It is not currently enforced for branch protection.

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run gate report tests
        run: python -m pytest tests/test_raster_diagnostics_gate_report.py

      - name: Run gate report (human mode)
        run: python scripts/raster_diagnostics_gate_report.py

      - name: Run gate report (JSON mode)
        run: python scripts/raster_diagnostics_gate_report.py --json

      - name: Run gate report (check mode)
        run: python scripts/raster_diagnostics_gate_report.py --check
